spring.application.name=backend

# Blockchain demo settings
blockchain.difficulty=3
blockchain.mining-reward=10

# Persistence is disabled by default.
# Supported values for blockchain.persistence.type: file, database
blockchain.persistence.enabled=false
blockchain.persistence.type=file
blockchain.persistence.file=data/blockchain-chain.json

# H2 database settings used when blockchain.persistence.type=database
spring.datasource.url=jdbc:h2:file:./data/blockchain-db
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
