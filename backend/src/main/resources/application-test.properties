spring.application.name=backend-test
logging.pattern.level=%5p [requestId=%X{requestId:-none}]

blockchain.difficulty=2
blockchain.mining-reward=10
blockchain.max-transactions-per-block=5
blockchain.consensus.policy=cumulative-difficulty
blockchain.consensus.finality-delay-blocks=0
blockchain.node.id=
blockchain.peer.timeout-ms=500
blockchain.peer.retry-attempts=1
blockchain.peer.eviction-score=-3
blockchain.peer.max-message-bytes=65536
blockchain.peer.scheduled-sync.enabled=false
blockchain.peer.scheduled-sync.interval-ms=30000
blockchain.security.enabled=false
blockchain.security.operator-token=operator-token
blockchain.security.read-only-token=read-only-token
blockchain.security.max-request-bytes=65536
blockchain.rate-limit.enabled=false
blockchain.rate-limit.expensive-limit=20
blockchain.rate-limit.window-ms=60000

blockchain.persistence.enabled=false
blockchain.persistence.type=database

spring.datasource.url=jdbc:h2:mem:blockchain-test;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
