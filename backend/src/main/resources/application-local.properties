spring.application.name=backend
logging.pattern.level=%5p [requestId=%X{requestId:-none}]

blockchain.difficulty=3
blockchain.mining-reward=10
blockchain.max-transactions-per-block=5
blockchain.peer.timeout-ms=1500
blockchain.peer.retry-attempts=2

blockchain.persistence.enabled=false
blockchain.persistence.type=file
blockchain.persistence.file=data/blockchain-chain.json

spring.datasource.url=jdbc:h2:file:./data/blockchain-db
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
