services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: "docker"
      BLOCKCHAIN_NODE_ID: "node-a"
      BLOCKCHAIN_PERSISTENCE_ENABLED: "true"
      BLOCKCHAIN_PERSISTENCE_TYPE: "database"
      SPRING_DATASOURCE_URL: "jdbc:h2:file:/data/blockchain-db"
    volumes:
      - blockchain-data:/data
  node-b:
    profiles:
      - multinode
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8081:8080"
    environment:
      SPRING_PROFILES_ACTIVE: "docker"
      BLOCKCHAIN_NODE_ID: "node-b"
      BLOCKCHAIN_PERSISTENCE_ENABLED: "true"
      BLOCKCHAIN_PERSISTENCE_TYPE: "database"
      SPRING_DATASOURCE_URL: "jdbc:h2:file:/data/blockchain-db"
      BLOCKCHAIN_PEER_SCHEDULED_SYNC_ENABLED: "true"
      BLOCKCHAIN_PEER_SCHEDULED_SYNC_INTERVAL_MS: "10000"
    volumes:
      - blockchain-node-b-data:/data
  node-c:
    profiles:
      - multinode
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8082:8080"
    environment:
      SPRING_PROFILES_ACTIVE: "docker"
      BLOCKCHAIN_NODE_ID: "node-c"
      BLOCKCHAIN_PERSISTENCE_ENABLED: "true"
      BLOCKCHAIN_PERSISTENCE_TYPE: "database"
      SPRING_DATASOURCE_URL: "jdbc:h2:file:/data/blockchain-db"
      BLOCKCHAIN_PEER_SCHEDULED_SYNC_ENABLED: "true"
      BLOCKCHAIN_PEER_SCHEDULED_SYNC_INTERVAL_MS: "10000"
    volumes:
      - blockchain-node-c-data:/data

volumes:
  blockchain-data:
  blockchain-node-b-data:
  blockchain-node-c-data:
